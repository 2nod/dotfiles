# herdr config — custom keybindings のみ。ここに書いた [[keys.command]] は
# 組み込みデフォルトに「追加」される（デフォルトのキーは保持）。
# 変更後は `herdr server reload-config`。カスタムキーを消すなら `herdr config reset-keys`。
#
# hunk プラグイン（edmundmiller/herdr-plugin-hunk）の diff アクションを prefix 配下に割当。
# 空きキー d/i/u（+ alt で tab 版）を使用。mnemonic: d=diff(worktree) / i=index(staged) / u=upstream(branch)。

[[keys.command]]
key = "prefix+d"
type = "plugin_action"
command = "hunk.diff.worktree-split"
description = "hunk worktree diff (split)"

[[keys.command]]
key = "prefix+alt+d"
type = "plugin_action"
command = "hunk.diff.worktree-tab"
description = "hunk worktree diff (tab)"

[[keys.command]]
key = "prefix+i"
type = "plugin_action"
command = "hunk.diff.staged-split"
description = "hunk staged diff (split)"

[[keys.command]]
key = "prefix+alt+i"
type = "plugin_action"
command = "hunk.diff.staged-tab"
description = "hunk staged diff (tab)"

[[keys.command]]
key = "prefix+u"
type = "plugin_action"
command = "hunk.diff.branch-split"
description = "hunk branch diff (split)"

[[keys.command]]
key = "prefix+alt+u"
type = "plugin_action"
command = "hunk.diff.branch-tab"
description = "hunk branch diff (tab)"
